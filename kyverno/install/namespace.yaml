apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/part-of: kyverno-learning-lab
    # Kyverno's own namespace is excluded from its own policy enforcement
    # by default namespace-exclusion configuration — see
    # ../config/namespaces.env and docs/12-security-and-governance.md.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
