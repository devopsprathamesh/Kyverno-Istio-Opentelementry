# INTENTIONALLY INSECURE LAB RESOURCE — hostNetwork, hostPID, hostIPC
# all set. Used in labs/lab-05-restrict-privileged-containers.md.
apiVersion: v1
kind: Pod
metadata:
  name: insecure-host-namespaces
  namespace: kyverno-demo
  labels:
    app.kubernetes.io/part-of: kyverno-learning-lab
    lab-marker: intentionally-insecure
spec:
  hostNetwork: true
  hostPID: true
  hostIPC: true
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {memory: 32Mi}
