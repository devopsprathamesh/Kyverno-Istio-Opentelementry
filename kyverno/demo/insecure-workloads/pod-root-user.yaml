# INTENTIONALLY INSECURE LAB RESOURCE — no runAsNonRoot, container
# defaults to root. Used in labs/lab-05 and labs/lab-07.
apiVersion: v1
kind: Pod
metadata:
  name: insecure-root-user
  namespace: kyverno-demo
  labels:
    app.kubernetes.io/part-of: kyverno-learning-lab
    lab-marker: intentionally-insecure
spec:
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {memory: 32Mi}
