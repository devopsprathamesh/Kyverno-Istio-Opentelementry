# Generic offline-test fixture (Deployment form) — mirrors
# compliant-pod.yaml for policies that specifically target
# Deployment/containers[]/initContainers[].
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture-compliant-deployment
  namespace: kyverno-demo
  labels:
    app.kubernetes.io/name: fixture-compliant-deployment
    app.kubernetes.io/part-of: kyverno-learning-lab
    owner: platform-team
    environment: lab
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: fixture-compliant-deployment}
  template:
    metadata:
      labels: {app.kubernetes.io/name: fixture-compliant-deployment}
    spec:
      initContainers:
        - name: init
          image: registry.k8s.io/pause:3.10
          resources:
            requests: {cpu: 5m, memory: 8Mi}
            limits: {memory: 16Mi}
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
