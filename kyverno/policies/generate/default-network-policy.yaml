# Lab: labs/lab-08-generate-network-policy.md
# Used by: scripts/validate-installation.sh's functional probe.
#
# Generates a standard Kubernetes NetworkPolicy (networking.k8s.io/v1) —
# not a CiliumNetworkPolicy — in any namespace labeled
# generate-default-networkpolicy=enabled. Cilium enforces standard
# Kubernetes NetworkPolicy objects natively (see
# ../../auto-setup-default-kube-env/docs/CILIUM-HUBBLE.md "CiliumNetworkPolicy
# and Kubernetes NetworkPolicy"), so this basic lab intentionally does
# NOT require any Cilium-specific CRD — see
# labs/lab-08-generate-network-policy.md for why.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: default-network-policy
  labels:
    app.kubernetes.io/part-of: kyverno-learning-lab
  annotations:
    policies.kyverno.io/title: Generate a Default NetworkPolicy
    policies.kyverno.io/category: Multi-Tenancy, Lab
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Namespace, NetworkPolicy
    policies.kyverno.io/description: >-
      When a Namespace is labeled generate-default-networkpolicy=enabled,
      generates a default NetworkPolicy allowing intra-namespace traffic
      and DNS egress, denying everything else by default. synchronize:
      true means the generated NetworkPolicy stays in lock-step with
      this source policy — see labs/lab-08 "Generate synchronization and
      generated-resource ownership".
spec:
  rules:
    - name: generate-default-netpol
      match:
        any:
          - resources:
              kinds: ["Namespace"]
              selector:
                matchLabels:
                  generate-default-networkpolicy: enabled
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-namespace-policy
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          metadata:
            labels:
              app.kubernetes.io/part-of: kyverno-learning-lab
              generated-by: kyverno
          spec:
            podSelector: {}
            policyTypes: ["Ingress", "Egress"]
            ingress:
              - from:
                  - podSelector: {}
            egress:
              - to:
                  - podSelector: {}
              - ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
