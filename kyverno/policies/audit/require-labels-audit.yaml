# Lab: labs/lab-02-audit-vs-enforce.md, labs/lab-03-require-labels.md
#
# Audit-mode twin of policies/validate/require-labels-enforce.yaml — same
# rule logic, different validationFailureAction. Deliberately kept as two
# separate files (not one policy toggled at apply time) so learners can
# `kubectl apply` either one explicitly and see the difference, matching
# this repo's audit-first rollout pattern (docs/DECISIONS.md ADR-013).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels-audit
  labels:
    app.kubernetes.io/part-of: kyverno-learning-lab
  annotations:
    policies.kyverno.io/title: Require Labels (Audit)
    policies.kyverno.io/category: Best Practices, Lab
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Reports (without blocking) Pods that are missing any of the four
      labels this lab standardizes on: app.kubernetes.io/name,
      app.kubernetes.io/part-of, owner, environment. Audit mode is the
      recommended first step before ever enforcing a new policy in
      production — see docs/DECISIONS.md ADR-013.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-required-labels
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: >-
          Missing one or more required labels: app.kubernetes.io/name,
          app.kubernetes.io/part-of, owner, environment. This is an
          AUDIT-only report — the Pod was still admitted. See the
          matching enforce-mode policy in policies/validate/.
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              app.kubernetes.io/part-of: "?*"
              owner: "?*"
              environment: "?*"
