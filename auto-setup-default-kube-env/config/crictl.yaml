# Static crictl configuration, copied verbatim to /etc/crictl.yaml on
# every node by scripts/guest/03-install-containerd.sh. Points crictl at
# the containerd CRI socket so `crictl` commands don't need --runtime-
# endpoint on every invocation.
runtime-endpoint: unix:///run/containerd/containerd.sock
image-endpoint: unix:///run/containerd/containerd.sock
timeout: 10
debug: false
