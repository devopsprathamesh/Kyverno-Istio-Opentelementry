# order-service — MANUALLY instrumented: deliberately carries NO
# instrumentation.opentelemetry.io/inject-* annotation. Trace/metric
# setup is entirely in ../../order-service/app.py's setup_telemetry().
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: otel-demo
  labels:
    app: order-service
    app.kubernetes.io/part-of: observability-learning-lab
spec:
  replicas: 1
  selector:
    matchLabels: {app: order-service}
  template:
    metadata:
      labels: {app: order-service}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: order-service
          image: otel-demo/order-service:1.0.0
          imagePullPolicy: Never
          ports:
            - {name: http, containerPort: 8000}
          env:
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector-gateway.opentelemetry.svc.cluster.local:4317"}
            - {name: INVENTORY_SERVICE_URL, value: "http://inventory-service.otel-demo.svc.cluster.local:8000"}
            - {name: PAYMENT_SERVICE_URL, value: "http://payment-service.otel-demo.svc.cluster.local:8000"}
            - {name: TIMEOUT_MS, value: "3000"}
            - {name: RETRY_ATTEMPTS, value: "2"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
