# Collector Agent (DaemonSet) pipeline configuration. Receives OTLP
# directly from pods on the same node (via the node's hostPort, reached
# through the Downward API HOST_IP env var — see
# ../../operator/instrumentation/ and ../../demo-application/kubernetes/)
# and reads node-local Kubernetes container logs via filelog. Forwards
# everything to the Gateway. See docs/09-collector-internals.md and
# docs/07-context-propagation.md for the full processor-ordering
# rationale.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent-config
  namespace: opentelemetry
  labels:
    app.kubernetes.io/part-of: observability-learning-lab
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 127.0.0.1:1777
      zpages:
        endpoint: 127.0.0.1:55679
      file_storage/checkpoint:
        # Persists filelog's per-file read offset to a node-local
        # emptyDir, so a Collector Agent restart resumes from where it
        # left off instead of re-reading (or losing) history — see
        # docs/06-logs.md "start_at behavior and log duplication/loss
        # risks".
        directory: /var/lib/otelcol/file_storage
        timeout: 10s

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Never ingest the agent's own logs — a real, documented risk
          # otherwise (an ingestion loop of the Collector logging about
          # ingesting its own logs). See docs/06-logs.md.
          - /var/log/pods/opentelemetry_otel-collector-agent-*/*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        storage: file_storage/checkpoint
        retry_on_failure:
          enabled: true
        operators:
          # The `container` operator auto-detects and parses the CRI
          # log format (this cluster's containerd/kubelet default —
          # confirmed, no custom log-dir override anywhere in
          # ../../../auto-setup-default-kube-env/) and recombines
          # partial/multiline entries (e.g. Python/Node stack traces)
          # automatically — the current recommended approach over
          # manually chaining regex_parser+recombine operators.
          - type: container
            add_metadata_from_filepath: true
          # Parse the application's structured JSON body into a
          # SEPARATE `attributes` namespace (parse_to: attributes) —
          # deliberately NOT overwriting `body`, so the original JSON
          # text is preserved for Grafana's Loki derivedFields regex
          # match (see ../../install/grafana/datasources/datasources.yaml)
          # and for anyone reading the raw log line directly.
          - type: json_parser
            parse_from: body
            parse_to: attributes
            on_error: send_quiet
          - type: severity_parser
            parse_from: attributes.severity
            on_error: send_quiet
          - type: time_parser
            parse_from: attributes.timestamp
            layout: '%Y-%m-%dT%H:%M:%S%z'
            on_error: send_quiet

    processors:
      # Always first in every pipeline — protects the Collector process
      # itself from OOM under load spikes by proactively refusing new
      # data once memory pressure crosses the limit, rather than being
      # OOMKilled by the kubelet with no warning. See
      # docs/09-collector-internals.md "Reliability".
      memory_limiter:
        check_interval: 2s
        limit_mib: 300
        spike_limit_mib: 100

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.container.name

      resource:
        attributes:
          - key: deployment.environment
            value: lab
            action: upsert
          - key: cluster.name
            value: devops-learning-lab
            action: upsert

      # Promotes the JSON-parsed trace_id/span_id fields (see the
      # filelog json_parser operator above) into the OTLP LogRecord's
      # actual trace_id/span_id fields, which is what makes Loki's
      # native trace-correlation-aware exporters and Grafana's
      # exemplar/derived-field linking semantically meaningful, not
      # just a text-match coincidence.
      transform/log_trace_context:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(trace_id.string, attributes["trace_id"]) where attributes["trace_id"] != nil
              - set(span_id.string, attributes["span_id"]) where attributes["span_id"] != nil

      # Drop this Collector's own health-check/readiness probe request
      # logs and anything explicitly marked debug-noise — a concrete,
      # minimal example of the filtering labs/lab-18 exercises further.
      filter/logs:
        error_mode: ignore
        logs:
          log_record:
            - 'attributes["http.route"] == "/healthz"'
            - 'attributes["http.route"] == "/readyz"'

      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      otlp/gateway:
        endpoint: otel-collector-gateway.opentelemetry.svc.cluster.local:4317
        tls:
          insecure: true  # in-cluster, node-agent-to-gateway hop only — see docs/17-security-and-governance.md "TLS and mTLS for OTLP" for the production alternative
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions: [health_check, pprof, zpages, file_storage/checkpoint]
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/gateway]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/gateway]
        logs:
          receivers: [filelog, otlp]
          processors: [memory_limiter, k8sattributes, resource, transform/log_trace_context, filter/logs, batch]
          exporters: [otlp/gateway]
