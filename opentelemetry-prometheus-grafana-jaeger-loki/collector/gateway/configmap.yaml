# Collector Gateway (Deployment) — central processing, three separate
# pipelines (traces/metrics/logs) per docs/09-collector-internals.md and
# docs/10-collector-deployment-patterns.md. Receives from every Agent
# (and, in principle, directly from any OTLP-speaking client) and fans
# out to Jaeger, Prometheus (scrape-based), and Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-gateway-config
  namespace: opentelemetry
  labels:
    app.kubernetes.io/part-of: observability-learning-lab
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 127.0.0.1:1777
      zpages:
        endpoint: 127.0.0.1:55679

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 2s
        limit_mib: 700
        spike_limit_mib: 200

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.node.name

      resource:
        attributes:
          - key: deployment.environment
            value: lab
            action: upsert
          - key: cluster.name
            value: devops-learning-lab
            action: upsert

      # Sensitive-field removal — never forward these attribute keys to
      # any backend, regardless of which pipeline. See
      # docs/17-security-and-governance.md.
      attributes/redact:
        actions:
          - key: http.request.header.authorization
            action: delete
          - key: password
            action: delete
          - key: token
            action: delete
          - key: card_number
            action: delete
          - key: customer.ssn
            action: delete

      # Tail sampling — a decision-per-trace made only after all of a
      # trace's spans have arrived (decision_wait), unlike head sampling
      # which decides per-span with no knowledge of the trace's outcome.
      # Policy order matters: the first matching policy's decision wins.
      # See docs/09-collector-internals.md "Head vs. tail sampling" and
      # labs/lab-15-sampling.md.
      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        expected_new_traces_per_sec: 20
        policies:
          - name: keep-all-errors
            type: status_code
            status_code: {status_codes: [ERROR]}
          - name: keep-slow-traces
            type: latency
            latency: {threshold_ms: 500}
          - name: probabilistic-baseline
            type: probabilistic
            probabilistic: {sampling_percentage: 15}

      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      # Jaeger v2 is itself a Collector distribution with a native,
      # stable OTLP receiver — plain otlp exporter, no Jaeger-proprietary
      # protocol. Service name confirmed post-install (chart-generated
      # name may differ — see docs/13-jaeger-architecture.md).
      otlp/jaeger:
        endpoint: jaeger-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 2000
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s

      # Scrape-based Prometheus integration (this lab's chosen approach —
      # see docs/DECISIONS.md ADR-028; remote-write is the documented
      # production alternative, docs/16-production-design.md). Prometheus
      # scrapes this endpoint via the PodMonitor in
      # ../../prometheus/podmonitors/.
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true

      # Loki's native OTLP ingestion. endpoint is the /otlp PATH ONLY —
      # the otlphttp exporter appends /v1/logs itself; appending it here
      # too causes a 404. See docs/06-logs.md and config/versions.env.
      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 2000
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions: [health_check, pprof, zpages]
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, attributes/redact, tail_sampling, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, attributes/redact, batch]
          exporters: [otlphttp/loki]
