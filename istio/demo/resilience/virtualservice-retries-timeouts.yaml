# Lab: labs/lab-09-retries-and-timeouts.md
# 2 retries, 2s per-try timeout, 5s overall request timeout, retrying
# only on the response codes documented as safe to retry (5xx/reset/
# connect-failure — never retrying on codes that could indicate a
# non-idempotent side effect already happened, see
# docs/09-resilience-patterns.md "Retry amplification risks and
# idempotency considerations").
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: order-service-resilience
  namespace: istio-demo
  labels:
    app.kubernetes.io/part-of: istio-learning-lab
spec:
  hosts: ["order-service"]
  http:
    - route:
        - destination: {host: order-service, subset: v1}
      timeout: 5s
      retries:
        attempts: 2
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"
