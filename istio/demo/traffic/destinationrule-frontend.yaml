# Lab: labs/lab-06-destinationrule-subsets.md
# Defines the v1/v2 subsets every VirtualService in this directory
# references by name. Without this DestinationRule, a VirtualService
# route naming subset "v1"/"v2" would fail to resolve — see
# docs/05-traffic-management.md "VirtualService and DestinationRule
# processing order".
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: frontend
  namespace: istio-demo
  labels:
    app.kubernetes.io/part-of: istio-learning-lab
spec:
  host: frontend
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
  subsets:
    - name: v1
      labels: {version: v1}
    - name: v2
      labels: {version: v2}
