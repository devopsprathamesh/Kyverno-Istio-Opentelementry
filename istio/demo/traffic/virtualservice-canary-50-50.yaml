# Lab: labs/lab-07-canary-traffic-shifting.md — stage 2 of 3.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: frontend-canary
  namespace: istio-demo
  labels:
    app.kubernetes.io/part-of: istio-learning-lab
spec:
  hosts: ["frontend"]
  http:
    - route:
        - destination: {host: frontend, subset: v1}
          weight: 50
        - destination: {host: frontend, subset: v2}
          weight: 50
