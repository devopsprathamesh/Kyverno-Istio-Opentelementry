# Lab: labs/lab-16-egress-control.md
# A whoami instance in istio-external (NOT sidecar-injected — see
# ../../demo/namespace.yaml) standing in for a real external HTTP
# service, so this lab never depends on a real, unstable public
# endpoint's uptime.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulated-external-api
  namespace: istio-external
  labels:
    app: simulated-external-api
    app.kubernetes.io/part-of: istio-learning-lab
    owner: platform-team
    environment: lab
spec:
  replicas: 1
  selector:
    matchLabels: {app: simulated-external-api}
  template:
    metadata:
      labels: {app: simulated-external-api, app.kubernetes.io/part-of: istio-learning-lab}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: whoami
          image: "traefik/whoami:v1.11.0"
          args: ["--port=80"]
          env:
            - {name: WHOAMI_NAME, value: "simulated-external-api"}
          ports:
            - {containerPort: 80, name: http}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
          readinessProbe:
            httpGet: {path: /health, port: 80}
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simulated-external-api
  namespace: istio-external
  labels:
    app.kubernetes.io/name: simulated-external-api
    app.kubernetes.io/part-of: istio-learning-lab
spec:
  selector:
    app: simulated-external-api
  ports:
    - {name: http, port: 80, targetPort: 80}
