# Istio `gateway` chart values (ingress) — recommended profile.
# Still service.type: ClusterIP (local access strategy does not change
# between profiles — only capacity/resilience does). See
# docs/DECISIONS.md ADR-023.

replicaCount: 2

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["istio-ingress"]
          topologyKey: kubernetes.io/hostname
